---
# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
docs_dir: "../../../websites-src/personal-website"
site_dir: "../../../docs"
site_name: Marco Ferrari
site_url: https://ferrarimarco.info
strict: true

theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.top
    - navigation.tracking
    - toc.follow

extra:
  analytics:
    provider: google
    property: UA-18832248-1
  consent:
    actions:
      - accept
      - manage
      - reject
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  social:
    - icon: /fontawesome/regular/envelope
      name: send me an email
      link: mailto:ferrari.marco@gmail.com
    - icon: fontawesome/brands/github
      name: GitHub
      link: https://github.com/ferrarimarco
    - icon: fontawesome/brands/linkedin
      name: LinkedIn
      link: https://www.linkedin.com/in/ferrarimark
    - icon: fontawesome/brands/stack-overflow
      name: Stackoverflow
      link: https://stackoverflow.com/users/653462

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - blog
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
  - tags

---
- name: Remove enterprise APT repository files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  with_items:
    - /etc/apt/sources.list.d/ceph.list
    - /etc/apt/sources.list.d/pve-enterprise.list
    - /etc/apt/sources.list.d/pve-enterprise.sources

- name: Enable PVE no-subscription repositories
  ansible.builtin.deb822_repository:
    name: "{{ item.name }}"
    uris: "{{ item.uris }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: "{{ item.components }}"
    signed_by: "https://enterprise.proxmox.com/debian/proxmox-release-{{ ansible_facts['distribution_release'] }}.gpg"
    types: deb
  become: true
  with_items:
    - name: pve-no-subscription
      uris: http://download.proxmox.com/debian/pve
      components: pve-no-subscription
    - name: ceph
      uris: http://download.proxmox.com/debian/ceph-squid
      components: no-subscription

---
- name: Print information about host - {{ inventory_hostname }}
  changed_when: false
  ansible.builtin.debug:
    msg: |
      Ansible connection: {{ ansible_connection }}
      Ansible distribution release: {{ ansible_facts["distribution_release"] }}
      Ansible distribution version: {{ ansible_facts["distribution_version"] }}
      Ansible distribution: {{ ansible_facts["distribution"] }}
      Ansible domain: {{ ansible_facts["domain"] }}
      Ansible FQDN: {{ ansible_facts["fqdn"] }}
      Ansible host: {{ ansible_host }}
      Ansible hostname: {{ ansible_facts["hostname"] }}
      Ansible kernel: {{ ansible_facts["kernel"] }}
      Ansible OS family: {{ ansible_facts["os_family"] }}
      Ansible processor: {{ ansible_facts["processor"] }}
      Ansible user: {{ ansible_user }}
      Inventory hostname: {{ inventory_hostname }}
      Inventory hostname short: {{ inventory_hostname_short }}

- name: Print gathered facts - {{ inventory_hostname }}
  ansible.builtin.debug:
    msg: |
      Facts for {{ inventory_hostname }}:
      {{ hostvars[inventory_hostname] | to_nice_json }}
    verbosity: 1

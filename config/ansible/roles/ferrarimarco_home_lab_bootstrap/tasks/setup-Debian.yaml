---
- name: Setup Debian repositories
  ansible.builtin.deb822_repository:
    name: "{{ repo.name }}"
    uris: "{{ repo.uris }}"
    suites: "{{ repo.suites }}"
    components: "{{ repo.components }}"
    signed_by: "{{ repo.signed_by }}"
    types: "{{ repo.types }}"
  become: true
  loop_control:
    loop_var: repo
  with_items:
    - name: debian
      signed_by: "/usr/share/keyrings/debian-archive-keyring.gpg"
      suites:
        - "{{ debian_release }}"
        - "{{ debian_release }}-backports"
        - "{{ debian_release }}-updates"
      types:
        - deb
      uris: http://deb.debian.org/debian/
      components:
        - main
        - contrib
    - name: debian-security
      signed_by: "/usr/share/keyrings/debian-archive-keyring.gpg"
      suites:
        - "{{ debian_release }}-security"
      types:
        - deb
      uris: http://security.debian.org/
      components:
        - main
        - contrib
  notify:
    - Update APT cache

- name: Ensure handlers are notified now
  ansible.builtin.meta: flush_handlers

- name: Install APT packages
  ansible.builtin.apt:
    cache_valid_time: "{{ apt_cache_valid_time }}"
    name: "{{ bootstrap_os_packages }}"
    state: present
    update_cache: true
  become: true

- name: Enable Debian non-free-firmware repository
  ansible.builtin.deb822_repository:
    name: debian-non-free-firmware
    uris: http://deb.debian.org/debian/
    suites:
      - "{{ debian_release }}"
      - "{{ debian_release }}-updates"
      - "{{ debian_release }}-backports"
    components:
      - non-free-firmware
    signed_by: "/usr/share/keyrings/debian-archive-keyring.gpg"
    types:
      - deb
      - deb-src
  become: true
  notify:
    - Update APT cache

- name: Ensure handlers are notified now
  ansible.builtin.meta: flush_handlers

- name: Force a cache update in case we didn't install any package
  ansible.builtin.apt:
    cache_valid_time: "{{ apt_cache_valid_time }}"
    update_cache: true
  become: true

- name: Debug bootstrap_os_firmware_packages
  ansible.builtin.debug:
    var: bootstrap_os_firmware_packages
    verbosity: 1

- name: Install non-free firmware
  ansible.builtin.apt:
    cache_valid_time: "{{ apt_cache_valid_time }}"
    name: "{{ bootstrap_os_firmware_packages }}"
    update_cache: true
  become: true
  notify:
    - Reboot the host
  when:
    - install_debian_non_free_firmware | default(false)

- name: Install Intel CPU microcode update
  ansible.builtin.apt:
    cache_valid_time: "{{ apt_cache_valid_time }}"
    name:
      - intel-microcode
    update_cache: true
  become: true
  notify:
    - Reboot the host
  when:
    - "'GenuineIntel' in ansible_facts['processor'][1]"
    - enable_intel_microcode_update | default(false)

- name: Install Intel iGPU packages
  ansible.builtin.apt:
    cache_valid_time: "{{ apt_cache_valid_time }}"
    name:
      - intel-gpu-tools
    update_cache: true
  become: true
  when:
    - has_intel_igpu

- name: Force a cache update before running apt-get dist-upgrade
  ansible.builtin.apt:
    cache_valid_time: "{{ apt_cache_valid_time }}"
    update_cache: true
  become: true
  when:
    - enable_debian_dist_upgrade

- name: APT dist-upgrade
  ansible.builtin.apt:
    cache_valid_time: "{{ apt_cache_valid_time }}"
    update_cache: true
    upgrade: dist
  become: true
  when:
    - enable_debian_dist_upgrade
